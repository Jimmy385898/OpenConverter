name: Review Windows

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-2019
    concurrency:
      group: "review-windows-${{ github.event.pull_request.number }}"
      cancel-in-progress: true 

    steps:
    - name: Checkout target branch code (using pull_request_target)
      uses: actions/checkout@v2
      with:
        ref: ${{ github.event.pull_request.head.ref }}

    - name: Fetch and checkout PR branch
      run: |
        git remote add pr_origin https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git
        git fetch pr_origin ${{ github.event.pull_request.head.ref }}:pr_branch
        git checkout pr_branch

    - name: Print current branch and commit hash
      run: |
        echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
        echo "Current commit hash: $(git rev-parse HEAD)"

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          make
          pkg-config
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-wget
          unzip
          wget
          curl

    - name: Checkout BMF repository
      run: |
        git clone https://github.com/JackLau1222/bmf.git
      shell: bash

    - name: Cache FFmpeg
      uses: actions/cache@v3
      with:
        path: ffmpeg-5.1.2-win64-gpl-shared
        key: ${{ runner.os }}-ffmpeg-5.1.2
        
    - name: Setup FFmpeg
      shell: pwsh
      run: |
        if (-not (Test-Path "ffmpeg-5.1.2-win64-gpl-shared")) {
          Invoke-WebRequest -Uri "https://github.com/GyanD/codexffmpeg/releases/download/5.1.2/ffmpeg-5.1.2-full_build-shared.7z" -OutFile "ffmpeg.7z"
          7z x ffmpeg.7z
          Rename-Item -Path "ffmpeg-5.1.2-full_build-shared" -NewName "ffmpeg-5.1.2-win64-gpl-shared"
          Remove-Item -Path "ffmpeg.7z"
        }
        $usrLocal = "C:\msys64\usr\local"
        if (-not (Test-Path $usrLocal)) {
          New-Item -Path $usrLocal -ItemType Directory -Force
        }
        Copy-Item -Path "ffmpeg-5.1.2-win64-gpl-shared\*" -Destination $usrLocal -Recurse -Force
        
        # 设置FFmpeg环境变量
        $env:FFMPEG_ROOT = "C:\msys64\usr\local"
        $env:PATH = "$env:FFMPEG_ROOT\bin;$env:PATH"
        
        # 验证FFmpeg安装
        ffmpeg -version

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Setup Python and Dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install timeout_decorator numpy onnxruntime pytest opencv-python cmake
        # 设置Python默认编码
        [System.Environment]::SetEnvironmentVariable('PYTHONIOENCODING', 'utf-8', 'User')

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        tools: 'tools_qtcreator'
        cache: true

    - name: Build BMF
      shell: pwsh
      run: |
        cd bmf
        $env:PYTHONIOENCODING = "utf-8"
        $env:PYTHONUTF8 = "1"
        
        # 设置环境变量
        $env:PATH = "/usr/bin:/usr/lib:/usr/local/bin:/usr/local/lib:$env:PATH"
        $pythonDir = "/c/hostedtoolcache/windows/Python/3.11/x64"
        $env:PYTHONHOME = $pythonDir
        $env:PYTHON = "$pythonDir/python.exe"
        $env:PYTHONPATH = "$pythonDir/Lib:$pythonDir/DLLs"
        
        # 构建BMF
        ./build_win_lite.sh --msvc=2019 --preset=x64-Release bmf_ffmpeg
        cmake --build build_win_lite/x64-Release --config Release --target ALL_BUILD
        cp -r build_win_lite/x64-Release/output ..

    - name: Set Environment Variables
      shell: pwsh
      run: |
        $currentLocation = Get-Location
        $outputDir = "$currentLocation\output"
        
        # 设置环境变量
        $env:C_INCLUDE_PATH = "$outputDir\bmf\include"
        $env:CPLUS_INCLUDE_PATH = "$outputDir\bmf\include"
        $env:LIBRARY_PATH = "$outputDir\bmf\lib"
        $env:PATH = "$outputDir\bmf\bin;$outputDir\bmf\lib;$env:PATH"
        $env:PYTHONPATH = "$outputDir\bmf\lib;$outputDir"
        
        # 写入到GITHUB_ENV
        "C_INCLUDE_PATH=$env:C_INCLUDE_PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "CPLUS_INCLUDE_PATH=$env:CPLUS_INCLUDE_PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "LIBRARY_PATH=$env:LIBRARY_PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PATH=$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PYTHONPATH=$env:PYTHONPATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Build Project
      shell: pwsh
      run: |
        mkdir -p src/build
        cd src
        
        # 设置环境变量
        $env:CMAKE_PREFIX_PATH = "$((Get-Location).Path)\..\output\bmf;$env:Qt5_DIR"
        $env:BMF_ROOT = "$((Get-Location).Path)\..\output\bmf"
        
        # CMake构建
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Create Package
      shell: pwsh
      run: |
        mkdir -p OpenConverter_Windows_x64
        Copy-Item -Path "src\build\Release\*" -Destination "OpenConverter_Windows_x64" -Recurse -Force
        Copy-Item -Path "output\bmf\lib\*" -Destination "OpenConverter_Windows_x64" -Recurse -Force
        7z a OpenConverter_Windows_x64.zip OpenConverter_Windows_x64

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: OpenConverter_Windows_x64
        path: OpenConverter_Windows_x64.zip

    - name: Setup tmate session
      if: ${{ failure() }}
      uses: mxschmitt/action-tmate@v3

    - name: Finish
      run: echo "Windows build complete" 