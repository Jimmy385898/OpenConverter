name: Review Windows

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    concurrency:
      group: "review-windows-${{ github.event.pull_request.number }}"
      cancel-in-progress: true

    steps:
    - name: Checkout target branch code (using pull_request_target)
      uses: actions/checkout@v2
      with:
        ref: ${{ github.event.pull_request.head.ref }}

    - name: Fetch and checkout PR branch
      run: |
        git remote add pr_origin https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git
        git fetch pr_origin ${{ github.event.pull_request.head.ref }}:pr_branch
        git checkout pr_branch

    - name: Print current branch and commit hash
      run: |
        echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
        echo "Current commit hash: $(git rev-parse HEAD)"

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          make
          pkg-config
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          unzip
          curl

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Setup Python and Dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install timeout_decorator numpy onnxruntime pytest opencv-python cmake
        [System.Environment]::SetEnvironmentVariable('PYTHONIOENCODING', 'utf-8', 'User')

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        tools: 'tools_qtcreator'
        cache: true

    - name: Setup FFmpeg
      shell: pwsh
      run: |
        # 下载并解压 FFmpeg
        if (-not (Test-Path "ffmpeg-5.1.2-win64-gpl-shared")) {
          Invoke-WebRequest -Uri "https://github.com/GyanD/codexffmpeg/releases/download/5.1.2/ffmpeg-5.1.2-full_build-shared.7z" -OutFile "ffmpeg.7z"
          7z x ffmpeg.7z
          Rename-Item -Path "ffmpeg-5.1.2-full_build-shared" -NewName "ffmpeg-5.1.2-win64-gpl-shared"
          Remove-Item -Path "ffmpeg.7z"
        }

        # 检查 FFmpeg 是否包含所需的头文件
        $ffmpegIncludePath = "ffmpeg-5.1.2-win64-gpl-shared\include\libavformat\avformat.h"
        if (-not (Test-Path $ffmpegIncludePath)) {
          throw "FFmpeg 安装失败，缺少文件: $ffmpegIncludePath"
        }

        # 将 FFmpeg 复制到 MSYS2 的 usr\local 目录
        $usrLocal = "C:\msys64\usr\local"
        if (-not (Test-Path $usrLocal)) {
          New-Item -Path $usrLocal -ItemType Directory -Force
        }
        Copy-Item -Path "ffmpeg-5.1.2-win64-gpl-shared\*" -Destination $usrLocal -Recurse -Force

    - name: Build Project
      shell: pwsh
      run: |
        # 创建构建目录
        mkdir -p src/build
        cd src

        # 设置 FFmpeg 相关环境变量
        $ffmpegRoot = "C:\msys64\usr\local"
        $env:FFMPEG_ROOT = $ffmpegRoot
        $env:FFMPEG_INCLUDE_DIRS = "$ffmpegRoot\include"
        $env:FFMPEG_LIBRARY_DIRS = "$ffmpegRoot\lib"
        $env:CMAKE_PREFIX_PATH = "$env:Qt5_DIR;$ffmpegRoot"
        $env:PATH = "$ffmpegRoot\bin;$env:PATH"

        # 打印环境变量以供调试
        Write-Host "FFMPEG_ROOT: $env:FFMPEG_ROOT"
        Write-Host "FFMPEG_INCLUDE_DIRS: $env:FFMPEG_INCLUDE_DIRS"
        Write-Host "FFMPEG_LIBRARY_DIRS: $env:FFMPEG_LIBRARY_DIRS"
        Write-Host "CMAKE_PREFIX_PATH: $env:CMAKE_PREFIX_PATH"

        # 运行 CMake 配置和构建
        cmake -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$env:CMAKE_PREFIX_PATH" `
          -DQt5_DIR="$env:Qt5_DIR/lib/cmake/Qt5" `
          -DFFMPEG_ROOT="$ffmpegRoot" `
          -DFFMPEG_INCLUDE_DIRS="$env:FFMPEG_INCLUDE_DIRS" `
          -DFFMPEG_LIBRARY_DIRS="$env:FFMPEG_LIBRARY_DIRS"

        cmake --build build --config Release

    - name: Create Package
      shell: pwsh
      run: |
        mkdir -p OpenConverter_Windows_x64
        Copy-Item -Path "src\build\Release\*" -Destination "OpenConverter_Windows_x64" -Recurse -Force
        7z a OpenConverter_Windows_x64.zip OpenConverter_Windows_x64

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: OpenConverter_Windows_x64
        path: OpenConverter_Windows_x64.zip

    - name: Setup tmate session
      if: ${{ failure() }}
      uses: mxschmitt/action-tmate@v3

    - name: Finish
      run: echo "Windows build complete"