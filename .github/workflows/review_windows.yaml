name: Review Windows

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    concurrency:
      group: "review-${{ github.event.pull_request.number }}"
      cancel-in-progress: true

    steps:
    - name: Checkout target branch code (using pull_request_target)
      uses: actions/checkout@v2
      with:
        ref: ${{ github.event.pull_request.head.ref }}

    - name: Fetch and checkout PR branch
      shell: bash
      run: |
        git remote add pr_origin https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git
        git fetch pr_origin ${{ github.event.pull_request.head.ref }}:pr_branch
        git checkout pr_branch

    - name: Print current branch and commit hash
      shell: bash
      run: |
        echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
        echo "Current commit hash: $(git rev-parse HEAD)"

    - name: Install Chocolatey
      shell: powershell
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
        Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

    - name: Install system dependencies
      shell: powershell
      run: |
        choco install -y git cmake visualstudio2022buildtools
        choco install -y nasm --version=2.16.01
        choco install -y yasm
        choco install -y python --version=3.9.0
        choco install -y 7zip

    - name: Cache x264 build
      uses: actions/cache@v3
      with:
        path: |
          x264
        key: ${{ runner.os }}-x264-${{ hashFiles('bmf/scripts/build_ffmpeg.sh') }}
        restore-keys: |
          ${{ runner.os }}-x264-

    - name: Setup NASM path
      shell: powershell
      run: |
        $nasmPath = "C:\ProgramData\chocolatey\lib\nasm\tools"
        if (-not (Test-Path $nasmPath)) {
          throw "NASM installation path not found"
        }
        Add-Content $env:GITHUB_ENV "PATH=$nasmPath;$env:PATH"

    - name: Verify NASM version
      shell: bash
      run: |
        if ! command -v nasm &> /dev/null; then
          echo "NASM not found in PATH"
          exit 1
        fi
        nasm -v
        if ! nasm -v | grep -q "version 2.1[3-9]"; then
          echo "NASM version is too old, installing latest version"
          choco install -y nasm --version=2.16.01
        fi

    - name: Compile x264 if not cached
      shell: bash
      run: |
        if [ ! -d "$(pwd)/x264" ]; then
          echo "x264 not found, starting build..."
          git clone https://code.videolan.org/videolan/x264.git
          (cd x264 && ./configure --prefix=$(pwd)/../x264 --enable-shared)
          (cd x264 && make -j$(nproc) && make install)
        else
          echo "x264 is already installed, skipping build."
        fi
        echo "X264_ROOT_PATH=$(pwd)/x264" >> $GITHUB_ENV

    - name: Download and extract FFmpeg
      shell: bash
      run: |
        curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2025-01-14-12-58/ffmpeg-n5.1.6-16-g6e63e49496-win64-gpl-shared-5.1.zip
        7z x ffmpeg.zip -offmpeg
        echo "FFMPEG_ROOT_PATH=$(pwd)/ffmpeg" >> $GITHUB_ENV

    - name: Install Qt
      shell: powershell
      run: |
        choco install -y qtcreator
        $env:Path += ";C:\Qt\Tools\QtCreator\bin"

    - name: Build with CMake
      shell: bash
      run: |
        export PATH=$PATH:$FFMPEG_ROOT_PATH/bin
        (cd src && cmake -B build -G "Visual Studio 17 2022" -A x64)
        (cd src/build && msbuild OpenConverter.sln /p:Configuration=Release /p:Platform=x64)

    - name: Copy runtime
      shell: bash
      run: |
        cp $FFMPEG_ROOT_PATH/lib/libswscale.so.6 src/build/lib
        cp $FFMPEG_ROOT_PATH/lib/libavfilter.so.8 src/build/lib
        cp $FFMPEG_ROOT_PATH/lib/libpostproc.so.56 src/build/lib
        echo "set PATH=%~dp0lib;%PATH%" > src/build/activate_env.bat

    - name: Create zip package
      shell: powershell
      run: |
        $buildDir = "src\build"
        $packageName = "OpenConverter_Windows_x64.zip"
        $outputDir = "OpenConverter_Windows_x64"
        New-Item -ItemType Directory -Path $outputDir
        Copy-Item -Path "$buildDir\*" -Destination $outputDir -Recurse
        7z a -tzip $packageName $outputDir
        Remove-Item -Recurse -Force $outputDir

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: OpenConverter_Windows_x64
        path: OpenConverter_Windows_x64.zip

    - name: Setup tmate session
      if: ${{ failure() }}
      uses: mxschmitt/action-tmate@v3

    - name: Finish
      run: echo "Release upload complete"
