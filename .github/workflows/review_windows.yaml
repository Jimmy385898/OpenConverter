name: Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    concurrency:
      group: "review-${{ github.event.pull_request.number }}"
      cancel-in-progress: true 

    steps:
    - name: Checkout target branch code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.ref }}

    - name: Fetch and checkout PR branch
      run: |
        git remote add pr_origin https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git
        git fetch pr_origin ${{ github.event.pull_request.head.ref }}:pr_branch
        git checkout pr_branch

    - name: Print current branch and commit hash
      run: |
        git rev-parse --abbrev-ref HEAD
        git rev-parse HEAD

    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        install-deps: 'true'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      with:
        vs-version: '16.0'

    - name: Download and Install FFmpeg
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path ffmpeg.zip -DestinationPath .\ffmpeg
        echo "FFMPEG_ROOT_PATH=$((Get-Item .\ffmpeg\ffmpeg-master-*).FullName)" >> $env:GITHUB_ENV

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release
      env:
        FFMPEG_ROOT: ${{ env.FFMPEG_ROOT_PATH }}

    - name: Build with CMake
      run: |
        cmake --build ${{github.workspace}}/build --config Release -j $env:NUMBER_OF_PROCESSORS

    - name: Package Build
      run: |
        $buildDir = "${{github.workspace}}/build/Release"
        $outputDir = "OpenConverter_Windows_x64"
        New-Item -ItemType Directory -Path $outputDir
        Copy-Item -Path "$buildDir/*" -Destination $outputDir -Recurse
        Compress-Archive -Path "$outputDir/*" -DestinationPath "OpenConverter_Windows_x64.zip"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: OpenConverter_Windows_x64
        path: OpenConverter_Windows_x64.zip

    - name: Setup tmate session
      if: ${{ failure() }}
      uses: mxschmitt/action-tmate@v3

    - name: Finish
      run: echo "Release upload complete"